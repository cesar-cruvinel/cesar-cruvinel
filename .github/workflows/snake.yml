name: Profile Summary Cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: vn7n24fzkq/github-profile-summary-cards@release
        with:
          USERNAME: cesar-cruvinel
          BRANCH_NAME: cards
          UTC_OFFSET: -3
          AUTO_PUSH: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push cards to branch
        run: |
          cd profile-summary-card-output
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Generate profile summary cards"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/cesar-cruvinel/cesar-cruvinel.git" HEAD:cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
